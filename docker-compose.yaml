# LOCAL DEVELOPMENT ONLY — do not run this on a server.
# Production uses docker-compose.prod.yml (Postgres + API + nginx).
#
# This file provides the local Postgres the app develops against, plus pgAdmin
# for convenience. The API itself is normally run on the host (`python main.py`)
# so you get the Flask reloader.
#
# Removed: zookeeper + kafka. The streaming pipeline belonged to the pre-pivot
# scraper architecture (ADR-0002); no Python code references Kafka any more, and
# the two containers were pure overhead.

services:
  postgres:
    image: postgres:13
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - melo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - melo-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  melo-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
