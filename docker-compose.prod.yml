# Production stack: Postgres + Flask API + nginx (static frontend + reverse proxy).
#
# Storage (ADR-0017): media is NOT served by this stack. Clients upload directly
# to Hetzner Object Storage via presigned PUT and read via short-lived presigned
# GET, so the server never proxies media bytes (ADR-0009). All storage settings
# come from `.env` via `env_file` below — that file MUST define:
#   STORAGE_BACKEND=s3
#   S3_ENDPOINT_URL=https://fsn1.your-objectstorage.com   # Falkenstein
#   S3_REGION=fsn1
#   S3_BUCKET=<bucket>
#   S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY
#   S3_ADDRESSING_STYLE=virtual
#   MEDIA_READ_URL_TTL_MINUTES=60
# They are deliberately NOT repeated under `environment:` below: an unset
# `${VAR}` there resolves to an empty string and would OVERRIDE the env_file
# value, silently breaking media.
#
# `.env` must also define real SECRET_KEY and JWT_SECRET_KEY — config.py raises
# on startup in production if either is missing or left at its default.

services:
  melo-database:
    image: postgres:15-alpine
    container_name: melo-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-melonews_prod}
    # Loopback ONLY. The API reaches Postgres over the compose network as
    # `melo-database`, so publishing this publicly would expose the database for
    # no reason. Admin access is via SSH tunnel.
    # Host port is configurable (DB_HOST_PORT) because this box may already run
    # another Postgres on 5432 — the container port never changes.
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - /backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-melonews_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - melo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  melo-api:
    build:
      context: .
      dockerfile: app/DockerFile
    container_name: melo-api-prod
    restart: always
    env_file:
      - .env
    # Loopback only — public traffic must arrive via nginx (TLS, headers).
    # nginx reaches the API in-network as `melo-api:5000`; this publish exists
    # purely for on-box debugging, so the host port is configurable
    # (API_HOST_PORT) to avoid colliding with anything else on 5000.
    ports:
      - "127.0.0.1:${API_HOST_PORT:-5000}:5000"
    environment:
      ENVIRONMENT: production
      FLASK_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin}@melo-database:5432/${DB_NAME:-melonews_prod}
      FLASK_APP: main.py
    depends_on:
      melo-database:
        condition: service_healthy
    # NOTE: no `./app:/app/app` bind mount. Mounting source over the image is a
    # dev pattern that silently overrides the code that was built and tested.
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - melo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  melo-nginx:
    image: nginx:alpine
    container_name: melo-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      # Static React build, produced by `npm run build` in app/frontend.
      - ./app/frontend/build:/usr/share/nginx/html:ro
      # Webroot for the Let's Encrypt HTTP-01 challenge (see nginx.conf).
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - melo-api
    networks:
      - melo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:
    driver: local

networks:
  melo-network:
    driver: bridge
