[pytest]
testpaths = app/test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
importmode = importlib
addopts = 
    --tb=short
    -v
    --disable-warnings
    -m "not integration"
    --import-mode=importlib
markers =
    integration: marks tests as integration tests (require Kafka/Docker)
    unit: marks tests as unit tests
    slow: marks tests as slow
norecursedirs = .git .venv venv __pycache__ *.egg-info migrations
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnknownMarkWarning
