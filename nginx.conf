worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Media does NOT traverse nginx: clients PUT/GET object storage directly via
    # presigned URLs (ADR-0009/0017). This ceiling only covers small multipart
    # posts to the API.
    client_max_body_size 25m;

    upstream api {
        server melo-api:5000;
    }

    server {
        listen 80;
        server_name _;

        # Static React build (mounted from app/frontend/build by compose).
        root /usr/share/nginx/html;
        index index.html;

        # Let's Encrypt HTTP-01 challenge (certbot webroot).
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # --- Flask API ---------------------------------------------------
        # Everything the backend serves lives under /api EXCEPT the legacy
        # export blueprint, which registers at /output. Both must proxy.
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /output/ {
            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # --- React SPA ---------------------------------------------------
        # CRA emits content-hashed filenames under /static, so they are safe to
        # cache indefinitely.
        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Client-side routing: deep links like /events/9 must return index.html
        # rather than 404. Keep this LAST — it is the catch-all.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ---------------------------------------------------------------------
    # HTTPS. Deliberately commented out: nginx REFUSES TO START if ssl_certificate
    # points at a file that does not exist, so enabling this before obtaining a
    # certificate would take the whole stack down.
    #
    # To enable:
    #   1. Point your domain's A record at the server and bring this stack up on :80.
    #   2. Issue a cert (webroot flow uses the ACME location above), e.g.:
    #        docker run --rm -v ./ssl:/etc/letsencrypt -v ./certbot/www:/var/www/certbot \
    #          certbot/certbot certonly --webroot -w /var/www/certbot -d your.domain
    #   3. Uncomment the block below, set server_name + cert paths, and additionally
    #      redirect port 80 to HTTPS.
    #   4. docker compose -f docker-compose.prod.yml restart melo-nginx
    #
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name your.domain;
    #
    #     ssl_certificate     /etc/nginx/ssl/live/your.domain/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/live/your.domain/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     add_header Strict-Transport-Security "max-age=31536000" always;
    #
    #     root /usr/share/nginx/html;
    #     index index.html;
    #
    #     location /api/    { proxy_pass http://api; proxy_set_header Host $host;
    #                         proxy_set_header X-Real-IP $remote_addr;
    #                         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #                         proxy_set_header X-Forwarded-Proto $scheme; }
    #     location /output/ { proxy_pass http://api; proxy_set_header Host $host;
    #                         proxy_set_header X-Real-IP $remote_addr;
    #                         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #                         proxy_set_header X-Forwarded-Proto $scheme; }
    #     location /static/ { expires 1y; add_header Cache-Control "public, immutable"; }
    #     location /        { try_files $uri $uri/ /index.html; }
    # }
}
