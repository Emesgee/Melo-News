worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Media does NOT traverse nginx: clients PUT/GET object storage directly via
    # presigned URLs (ADR-0009/0017). This ceiling only covers small multipart
    # posts to the API.
    client_max_body_size 25m;

    upstream api {
        server melo-api:5000;
    }

    # NOTE: /output/ is proxied as well as /api/ — the legacy export blueprint
    # registers at /output, the one server route not under /api.

    # ── HTTP :80 — ACME + redirect to HTTPS ──────────────────────────
    server {
        listen 80;
        server_name _;

        # Must stay reachable for certificate RENEWAL. Keep above the redirect.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect to the canonical host explicitly rather than $host: a request
        # to the bare IP would otherwise redirect to https://<ip>, which fails
        # certificate validation (the cert covers drill.melonews.tech only).
        location / {
            return 301 https://drill.melonews.tech$request_uri;
        }
    }

    # ── HTTPS :443 — the real server ─────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name drill.melonews.tech;

        ssl_certificate     /etc/nginx/ssl/live/drill.melonews.tech/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/drill.melonews.tech/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # The Android reporter client requires HTTPS (network_security_config
        # sets cleartextTrafficPermitted=false), and reporter credentials pass
        # through here, so pin clients to TLS.
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Static React build (mounted from app/frontend/build by compose).
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /output/ {
            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # CRA emits content-hashed filenames under /static — safe to cache hard.
        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Client-side routing: deep links like /events/9 must return index.html
        # rather than 404. Keep LAST — it is the catch-all.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
