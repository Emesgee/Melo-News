name: Test Backend & Deploy to DigitalOcean

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    outputs:
      test-status: ${{ job.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt 2>&1 | tee pip-install.log || true
          echo "==== Checking installation ===="
          pip list

      - name: Run Python tests
        run: |
          pytest app/test/ -v --cov=app --cov-report=xml --tb=short 2>&1 | tee test-output.log || true
        continue-on-error: true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-logs
          path: |
            test-output.log
            pip-install.log

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  deploy-staging:
    needs: test-backend
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Deploy to DigitalOcean Staging
        if: secrets.SSH_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /app/melo-news || mkdir -p /app/melo-news && cd /app/melo-news
            git fetch origin
            git checkout develop
            git pull origin develop
            pip install -r requirements-prod.txt
            docker-compose -f docker-compose.prod.yml down || true
            docker-compose -f docker-compose.prod.yml up -d
            echo "✅ Staging deployed successfully"
            docker-compose -f docker-compose.prod.yml ps

      - name: Deployment Status
        if: always()
        run: echo "Deployment Status: ${{ job.status }}"

  deploy-production:
    needs: test-backend
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy to DigitalOcean Production
        if: secrets.SSH_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /app/melo-news || mkdir -p /app/melo-news && cd /app/melo-news
            git fetch origin
            git checkout main
            git pull origin main
            pip install -r requirements-prod.txt
            docker-compose -f docker-compose.prod.yml down || true
            docker-compose -f docker-compose.prod.yml up -d
            echo "✅ Production deployed successfully"
            docker-compose -f docker-compose.prod.yml ps

      - name: Health Check
        run: |
          sleep 10
          curl -f http://localhost:5000/api/health || echo "Health check pending"
        continue-on-error: true

      - name: Production Deployment Status
        if: always()
        run: echo "Production Deployment Status: ${{ job.status }}"
