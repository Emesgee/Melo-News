name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lint tools
        run: pip install flake8 black
      - name: Check formatting (black)
        run: black --check --diff .
      - name: Lint (flake8)
        run: flake8 --max-line-length=120 --exclude=venv,node_modules,migrations,__pycache__ .

  backend-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm
      - name: Run pytest (unit tests only)
        run: pytest --tb=short -v -m "not integration"
        env:
          ENVIRONMENT: testing
          SECRET_KEY: test-ci-secret
          JWT_SECRET_KEY: test-ci-jwt-secret

  frontend-tests:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Jest tests
        run: npx jest --ci --passWithNoTests
      - name: Build frontend
        run: npm run build
